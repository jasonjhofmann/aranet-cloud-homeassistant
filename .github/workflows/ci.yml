name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Ruff (lint)
        run: |
          uv run --python 3.14 --with ruff \
            ruff check custom_components/ tests/

      - name: Ruff (format check)
        run: |
          uv run --python 3.14 --with ruff \
            ruff format --check custom_components/ tests/

      # The integration package is named ``aranet_cloud`` — the same top-level
      # name as its dependency library — so the dependency must be installed
      # for mypy to resolve the bare ``from aranet_cloud import …`` correctly
      # (see the mypy_path / explicit_package_bases note in pyproject.toml).
      - name: Mypy (strict)
        run: |
          uv run --python 3.14 \
            --with mypy \
            --with homeassistant \
            --with aiohttp \
            --with voluptuous \
            --with "aranet-cloud==0.2.2" \
            mypy custom_components/aranet_cloud/

  # Guards the declared support floor (hacs.json: HA 2025.1 = Python 3.12).
  # A 3.14-only construct slipping in (e.g. unparenthesized ``except A, B:``)
  # fails here instead of as a SyntaxError on users' installs.
  syntax-floor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Compile on Python 3.12 (support floor)
        run: |
          uv run --python 3.12 --no-project \
            python -m compileall -q custom_components/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Pytest (with coverage gate)
        run: |
          uv run --python ${{ matrix.python-version }} \
            --with pytest-homeassistant-custom-component \
            --with pytest-cov \
            --with "aranet-cloud==0.2.2" \
            python -m pytest tests/ -v \
              --cov=custom_components.aranet_cloud \
              --cov-report=term-missing \
              --cov-fail-under=95
